# Bot de reportes (AgentBot de Chatwoot). Se une a la red de Chatwoot para que
# el rails alcance el webhook; NO publica puerto al host (aislado).
services:
  chatwoot-fsm-bot:
    build: .
    image: sentinela-chatwoot-bot
    container_name: sentinela-chatwoot-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot_state:/data          # SQLite del historial conversacional (persistente)
    networks:
      - chatwoot
    # outgoing_url del AgentBot en Chatwoot:
    #   http://sentinela-chatwoot-bot:8090/chatwoot/agentbot

volumes:
  bot_state:

networks:
  chatwoot:
    external: true
    name: chatwoot_default
