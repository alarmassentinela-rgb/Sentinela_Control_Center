services:
  gateway:
    build: .
    image: coc-gateway:dev
    env_file: ../.env
    ports:
      - "8400:8400"
    restart: unless-stopped
    depends_on:
      - gateway-db

  gateway-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coc
      POSTGRES_PASSWORD: coc
      POSTGRES_DB: coc_gateway
    volumes:
      - coc_gateway_db:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  coc_gateway_db:
