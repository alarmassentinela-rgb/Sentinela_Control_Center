<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#F0D080"/>
      <stop offset="100%" style="stop-color:#A8722A"/>
    </linearGradient>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3A2A"/>
      <stop offset="100%" style="stop-color:#0D2418"/>
    </linearGradient>
    <radialGradient id="bR" cx="38%" cy="35%" r="65%" fx="38%" fy="35%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="70%" style="stop-color:#ececec"/>
      <stop offset="100%" style="stop-color:#d0d0d0"/>
    </radialGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000044"/>
    </filter>
  </defs>

  <!-- Fondo cuadrado redondeado (app icon) -->
  <rect width="180" height="180" rx="36" fill="url(#bgG)"/>

  <!-- Borde dorado -->
  <rect width="180" height="180" rx="36" fill="none" stroke="url(#goldG)" stroke-width="2.5" opacity="0.5"/>

  <!-- Pelota de golf -->
  <circle cx="90" cy="86" r="42" fill="url(#bR)" filter="url(#sh)"/>

  <!-- Dimples -->
  <circle cx="80" cy="74" r="5" fill="#c8c8c8" opacity="0.7"/>
  <circle cx="98" cy="71" r="5" fill="#c8c8c8" opacity="0.7"/>
  <circle cx="111" cy="83" r="5" fill="#c8c8c8" opacity="0.7"/>
  <circle cx="107" cy="97" r="5" fill="#c8c8c8" opacity="0.7"/>
  <circle cx="90" cy="102" r="5" fill="#c8c8c8" opacity="0.7"/>
  <circle cx="73" cy="97" r="5" fill="#c8c8c8" opacity="0.7"/>
  <circle cx="70" cy="83" r="5" fill="#c8c8c8" opacity="0.7"/>
  <circle cx="90" cy="66" r="5" fill="#c8c8c8" opacity="0.7"/>

  <!-- Pin -->
  <line x1="90" y1="130" x2="90" y2="160" stroke="url(#goldG)" stroke-width="3.5" stroke-linecap="round"/>
  <ellipse cx="90" cy="160" rx="18" ry="5" fill="#0D2418" opacity="0.4"/>
  <ellipse cx="90" cy="159" rx="14" ry="4" fill="url(#goldG)" opacity="0.5"/>
  <!-- Bandera -->
  <path d="M90 130 L120 138 L90 150 Z" fill="url(#goldG)"/>

  <!-- Corona -->
  <g transform="translate(60, 22)">
    <path d="M5 20 L5 8 L14 14 L30 2 L46 14 L55 8 L55 20 Z" fill="url(#goldG)" filter="url(#sh)"/>
    <rect x="3" y="20" width="54" height="8" rx="2" fill="url(#goldG)"/>
    <circle cx="30" cy="10" r="3.5" fill="#fff" opacity="0.9"/>
    <circle cx="13" cy="15" r="2.5" fill="#fff" opacity="0.7"/>
    <circle cx="47" cy="15" r="2.5" fill="#fff" opacity="0.7"/>
  </g>

  <!-- Líneas decorativas esquinas -->
  <line x1="15" y1="15" x2="35" y2="15" stroke="url(#goldG)" stroke-width="1.5" opacity="0.4"/>
  <line x1="15" y1="15" x2="15" y2="35" stroke="url(#goldG)" stroke-width="1.5" opacity="0.4"/>
  <line x1="145" y1="15" x2="165" y2="15" stroke="url(#goldG)" stroke-width="1.5" opacity="0.4"/>
  <line x1="165" y1="15" x2="165" y2="35" stroke="url(#goldG)" stroke-width="1.5" opacity="0.4"/>
  <line x1="15" y1="165" x2="35" y2="165" stroke="url(#goldG)" stroke-width="1.5" opacity="0.4"/>
  <line x1="15" y1="145" x2="15" y2="165" stroke="url(#goldG)" stroke-width="1.5" opacity="0.4"/>
  <line x1="145" y1="165" x2="165" y2="165" stroke="url(#goldG)" stroke-width="1.5" opacity="0.4"/>
  <line x1="165" y1="145" x2="165" y2="165" stroke="url(#goldG)" stroke-width="1.5" opacity="0.4"/>
</svg>