# ============================================================
# GOLFBOOKVIP.COM — Nginx Site Config
# ============================================================

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name golfbookvip.com www.golfbookvip.com api.golfbookvip.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── API — api.golfbookvip.com ──────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.golfbookvip.com;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/golfbookvip.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/golfbookvip.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Rate limiting general
    limit_req zone=api burst=50 nodelay;

    # Rate limiting en auth
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSockets — Scoring en tiempo real
    location /ws/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API REST
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Docs (solo en desarrollo)
    location /docs {
        proxy_pass http://api:8000/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://api:8000/redoc;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://api:8000/health;
        access_log off;
    }

    # Media / Archivos estáticos
    location /media/ {
        alias /var/www/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ── FRONTEND PWA — golfbookvip.com ────────────────────────
server {
    listen 443 ssl http2;
    server_name golfbookvip.com www.golfbookvip.com;

    ssl_certificate     /etc/letsencrypt/live/golfbookvip.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/golfbookvip.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/frontend;
    index index.html;

    # React PWA — todas las rutas al index.html
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }

    # Assets con cache largo
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker sin cache
    location /service-worker.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
