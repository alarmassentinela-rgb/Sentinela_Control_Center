# ============================================================
# GOLFBOOKVIP.COM — Docker Compose
# Servicios: FastAPI + PostgreSQL + Redis + Nginx
# ============================================================

networks:
  golfbookvip_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_data:
    driver: local
  nginx_logs:
    driver: local
  portainer_data:
    driver: local

services:

  # ──────────────────────────────────────────
  # BASE DE DATOS — PostgreSQL 16
  # ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: golfbookvip_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-golfbookvip}
      POSTGRES_USER: ${POSTGRES_USER:-golfuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - golfbookvip_net
    mem_limit: 1g
    cpus: '0.75'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-golfuser} -d ${POSTGRES_DB:-golfbookvip}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────
  # CACHE Y WEBSOCKETS — Redis 7
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: golfbookvip_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - golfbookvip_net
    mem_limit: 300m
    cpus: '0.25'
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ──────────────────────────────────────────
  # API — FastAPI
  # ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golfbookvip_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-golfuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-golfbookvip}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    ports:
      - "8100:8000"   # NPM hace el proxy externo; 8100 solo accesible desde LAN interna
    volumes:
      - media_data:/app/media
      - ./app:/app/app       # Hot reload en desarrollo
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    networks:
      - golfbookvip_net
    mem_limit: 512m
    cpus: '0.5'
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ──────────────────────────────────────────
  # MIGRACIONES — Alembic (corre y sale)
  # ──────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golfbookvip_migrate
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-golfuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-golfbookvip}
    networks:
      - golfbookvip_net
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ──────────────────────────────────────────
  # FRONTEND — Next.js
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: golfbookvip_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - golfbookvip_net
    mem_limit: 512m
    cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────
  # ADMIN DOCKER — Portainer
  # ──────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: golfbookvip_portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    mem_limit: 256m
    networks:
      - golfbookvip_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

