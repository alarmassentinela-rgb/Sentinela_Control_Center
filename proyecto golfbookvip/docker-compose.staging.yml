name: gbv_staging

networks:
  staging_net:
    driver: bridge

volumes:
  staging_postgres_data:
    driver: local
  staging_redis_data:
    driver: local
  staging_media_data:
    driver: local

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-golfbookvip_staging}
      POSTGRES_USER: ${POSTGRES_USER:-golfuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-golfbookvip_staging_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - staging_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - staging_redis_data:/data
    networks:
      - staging_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    command: ["alembic", "upgrade", "head"]
    environment:
      ENVIRONMENT: staging
      SECRET_KEY: ${SECRET_KEY:-staging-local-secret-change-me}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-golfuser}:${POSTGRES_PASSWORD:-golfbookvip_staging_password}@db:5432/${POSTGRES_DB:-golfbookvip_staging}
      REDIS_URL: redis://redis:6379/0
    networks:
      - staging_net
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    environment:
      ENVIRONMENT: staging
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:-staging-local-secret-change-me}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-golfuser}:${POSTGRES_PASSWORD:-golfbookvip_staging_password}@db:5432/${POSTGRES_DB:-golfbookvip_staging}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8110"]'
    ports:
      - "8110:8000"
    volumes:
      - staging_media_data:/app/media
    networks:
      - staging_net
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
