<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F0D080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8722A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3A2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D2418;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ballGrad" cx="40%" cy="35%" r="60%" fx="40%" fy="35%" id="ballGrad" gradientUnits="objectBoundingBox">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="ballRadial" cx="38%" cy="35%" r="65%" fx="38%" fy="35%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="70%" style="stop-color:#e8e8e8" />
      <stop offset="100%" style="stop-color:#c0c0c0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fondo oscuro redondeado -->
  <rect width="520" height="180" rx="16" fill="url(#greenGrad)"/>

  <!-- Línea decorativa superior -->
  <rect x="0" y="0" width="520" height="3" rx="2" fill="url(#goldGrad)" opacity="0.8"/>

  <!-- ── ÍCONO IZQUIERDO ─────────────────────── -->

  <!-- Círculo base del ícono -->
  <circle cx="88" cy="90" r="62" fill="#0F2318" opacity="0.6"/>
  <circle cx="88" cy="90" r="58" fill="none" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.5"/>

  <!-- Pelota de golf -->
  <circle cx="88" cy="82" r="28" fill="url(#ballRadial)" filter="url(#shadow)"/>

  <!-- Dimples de la pelota (hoyuelos) -->
  <circle cx="82" cy="75" r="3.2" fill="#c8c8c8" opacity="0.7"/>
  <circle cx="93" cy="73" r="3.2" fill="#c8c8c8" opacity="0.7"/>
  <circle cx="100" cy="80" r="3.2" fill="#c8c8c8" opacity="0.7"/>
  <circle cx="97" cy="89" r="3.2" fill="#c8c8c8" opacity="0.7"/>
  <circle cx="87" cy="91" r="3.2" fill="#c8c8c8" opacity="0.7"/>
  <circle cx="77" cy="87" r="3.2" fill="#c8c8c8" opacity="0.7"/>
  <circle cx="75" cy="78" r="3.2" fill="#c8c8c8" opacity="0.7"/>
  <circle cx="88" cy="68" r="3.2" fill="#c8c8c8" opacity="0.7"/>

  <!-- Bandera / Pin -->
  <line x1="88" y1="114" x2="88" y2="140" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Base -->
  <ellipse cx="88" cy="141" rx="12" ry="4" fill="#0F2318" opacity="0.5"/>
  <ellipse cx="88" cy="140" rx="10" ry="3" fill="url(#goldGrad)" opacity="0.6"/>
  <!-- Banderita -->
  <path d="M88 115 L108 120 L88 127 Z" fill="url(#goldGrad)"/>

  <!-- Corona VIP encima -->
  <g transform="translate(72, 46)">
    <!-- Corona -->
    <path d="M4 14 L4 6 L10 10 L16 2 L22 10 L28 6 L28 14 Z" 
          fill="url(#goldGrad)" filter="url(#shadow)"/>
    <rect x="2" y="14" width="28" height="5" rx="1" fill="url(#goldGrad)"/>
    <!-- Joyas de la corona -->
    <circle cx="16" cy="8" r="2" fill="#fff" opacity="0.9"/>
    <circle cx="8" cy="11" r="1.5" fill="#fff" opacity="0.7"/>
    <circle cx="24" cy="11" r="1.5" fill="#fff" opacity="0.7"/>
  </g>

  <!-- ── TEXTO ──────────────────────────────── -->

  <!-- GOLF -->
  <text x="168" y="80" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="52" 
        font-weight="700"
        letter-spacing="4"
        fill="url(#goldGrad)"
        filter="url(#shadow)">GOLF</text>

  <!-- Línea separadora decorativa -->
  <line x1="168" y1="90" x2="490" y2="90" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.4"/>

  <!-- BOOK -->
  <text x="168" y="128"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52"
        font-weight="700"
        letter-spacing="4"
        fill="#ffffff"
        opacity="0.95">BOOK</text>

  <!-- VIP — badge dorado -->
  <rect x="392" y="100" width="82" height="36" rx="6" fill="url(#goldGrad)" filter="url(#shadow)"/>
  <text x="433" y="124"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22"
        font-weight="900"
        letter-spacing="3"
        fill="#0D2418"
        text-anchor="middle">VIP</text>

  <!-- Punto decorativo separador -->
  <circle cx="380" cy="116" r="3" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- Tagline -->
  <text x="168" y="155"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="11"
        letter-spacing="4"
        fill="url(#goldGrad)"
        opacity="0.7">YOUR PREMIUM GOLF EXPERIENCE</text>

  <!-- Línea decorativa inferior -->
  <rect x="0" y="177" width="520" height="3" rx="2" fill="url(#goldGrad)" opacity="0.8"/>
</svg>